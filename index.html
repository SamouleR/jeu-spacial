<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu Fondation - Sélection du joueur</title>
    <style>
        /* --- STYLE SPÉCIFIQUE POUR L'ACCUEIL (index.html) --- */

/* On réutilise les variables et le body du jeu, 
   mais on ajoute des règles spécifiques pour centrer le menu */

body {
    /* Si ce n'est pas déjà fait par le CSS du jeu : */
    font-family: 'Rajdhani', sans-serif;
    background-color: var(--bg-deep, #050510);
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 243, 255, 0.05) 0%, transparent 50%);
    color: var(--text-main, #e0e6ed);
    
    /* Centrage vertical et horizontal pour le menu */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
}

/* Titre principal de l'accueil */
body > h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.5rem;
    color: var(--neon-blue, #00f3ff);
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
    border-bottom: none; /* On retire la bordure du h1 global si présente */
}

/* Paragraphe d'instruction */
body > p {
    font-size: 1.2rem;
    color: var(--text-dim, #8a8a9b);
    max-width: 600px;
    margin-bottom: 50px;
    line-height: 1.6;
}

/* Conteneur des boutons */
.buttons {
    display: flex;
    gap: 40px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
}

/* Liens (pour retirer le soulignement) */
.buttons a {
    text-decoration: none;
}

/* Style des Gros Boutons de sélection */
.btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: bold;
    text-transform: uppercase;
    padding: 20px 50px;
    background: rgba(13, 13, 25, 0.8); /* Fond sombre */
    color: white;
    border: 2px solid;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    min-width: 250px;
    position: relative;
    overflow: hidden;
}

/* Bouton Joueur 1 (Cyan) */
a[href="joueur1.html"] .btn {
    border-color: var(--neon-blue, #00f3ff);
    color: var(--neon-blue, #00f3ff);
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
}

a[href="joueur1.html"] .btn:hover {
    background: var(--neon-blue, #00f3ff);
    color: #000;
    box-shadow: 0 0 30px var(--neon-blue, #00f3ff);
    transform: scale(1.05);
}

/* Bouton Joueur 2 (Violet) */
a[href="joueur2.html"] .btn {
    border-color: var(--neon-purple, #bc13fe);
    color: var(--neon-purple, #bc13fe);
    box-shadow: 0 0 10px rgba(188, 19, 254, 0.2);
}

a[href="joueur2.html"] .btn:hover {
    background: var(--neon-purple, #bc13fe);
    color: #000;
    box-shadow: 0 0 30px var(--neon-purple, #bc13fe);
    transform: scale(1.05);
}

/* Note de bas de page */
.note {
    font-size: 0.9rem;
    color: var(--neon-orange, #ff9f1c);
    background: rgba(255, 159, 28, 0.1);
    padding: 10px 20px;
    border-radius: 5px;
    border: 1px dashed var(--neon-orange, #ff9f1c);
    margin-top: 20px;
    font-family: 'Courier New', monospace;
}
    </style>
   
</head>
<body>
    <h1>Jeu Fondation - Sélection du joueur</h1>
    <p>
        Choisissez le joueur.  
        Ouvrez Joueur 1 sur un écran / navigateur, et Joueur 2 sur un autre (ou en navigation privée).
    </p>
    <div class="buttons">
        <a href="joueur1.html"><button class="btn">👤 Joueur 1</button></a>
        <a href="joueur2.html"><button class="btn">👤 Joueur 2</button></a>
    </div>
    <div class="note">
        Une seule partie globale est partagée entre les deux joueurs.
    </div>
</body>
</html>
